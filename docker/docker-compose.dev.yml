version: '3.8'

# Development Mode - Code hot-reload enabled
# Usage: docker-compose -f docker/docker-compose.dev.yml up

services:
  ghidra-bridge-dev:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ghidra-mcp-bridge-dev
    image: ghidra-mcp-bridge:dev

    environment:
      - GHIDRA_MCP_HOST=0.0.0.0
      - GHIDRA_MCP_PORT=8803
      - GHIDRA_MCP_SSE_PORT=8804
      - PROJECT_MODE=local
      - PROJECT_PATH=/ghidra-projects
      - PROJECT_NAME=${PROJECT_NAME:-default}
      - LOG_LEVEL=DEBUG  # More verbose for development
      - LOG_DIR=/app/logs

    ports:
      - "8803:8803"
      - "8804:8804"

    volumes:
      # Mount Ghidra project
      - ${HOST_PROJECT_PATH:-/tmp/ghidra-project}:/ghidra-projects:rw

      # Mount source code for hot-reload
      - ../api:/app/api:ro
      - ../api_v1:/app/api_v1:ro
      - ../utils:/app/utils:ro
      - ../scripts:/app/scripts:ro
      - ../docker_only_ghidra_mcp_server.py:/app/docker_only_ghidra_mcp_server.py:ro

      # Logs (read-write)
      - ../logs:/app/logs:rw

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

    # Development tips
    # stdin_open: true
    # tty: true

# Development workflow:
# 1. Set environment: export HOST_PROJECT_PATH=/path/to/your/ghidra-project
# 2. Start: docker-compose -f docker/docker-compose.dev.yml up
# 3. Edit code: Changes reflected immediately via volume mounts
# 4. Reload APIs: curl http://localhost:8803/_reload
# 5. View logs: docker-compose -f docker/docker-compose.dev.yml logs -f
# 6. Debug: docker exec -it ghidra-mcp-bridge-dev /bin/bash
