version: '3.8'

# PyGhidra Edition - Uses Ghidra 12.0+ with native PyGhidra support
# No Ghidrathon required

services:
  ghidra-bridge:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pyghidra
    container_name: ghidra-mcp-bridge-pyghidra
    image: ghidra-mcp-bridge:pyghidra

    environment:
      # Server configuration
      - GHIDRA_MCP_HOST=0.0.0.0
      - GHIDRA_MCP_PORT=8803
      - GHIDRA_MCP_SSE_PORT=8804

      # Project configuration
      - PROJECT_MODE=local
      - PROJECT_PATH=/ghidra-projects
      - PROJECT_NAME=${PROJECT_NAME:-default}

      # Logging
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs

    ports:
      - "8803:8803"   # HTTP API
      - "8804:8804"   # MCP SSE

    volumes:
      # Mount Ghidra project directory
      # Replace with your actual project path
      - ${HOST_PROJECT_PATH:-./ghidra-projects}:/ghidra-projects:rw

      # Log persistence
      - ./logs:/app/logs:rw

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s  # PyGhidra needs more time to initialize

    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          memory: 4G
