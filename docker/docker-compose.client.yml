version: '3.8'

# Ghidra MCP Bridge - Client for Server Mode
# This compose file creates a Bridge client that connects to Ghidra Server
#
# Usage:
#   make client-up          # Start first client (ports 8803/8804)
#   make client2-up         # Start second client (ports 8813/8814)
#   make client-down        # Stop client
#
# Connection Modes:
#   1. Docker Network Mode (default):
#      GHIDRA_SERVER_HOST=ghidra-server (joins ghidra-shared-network)
#   2. External Server Mode:
#      GHIDRA_SERVER_HOST=host.docker.internal or external IP
#
# Multi-Client Support:
#   Set CLIENT_CONTAINER_NAME, CLIENT_MCP_PORT, CLIENT_MCP_SSE_PORT, CLIENT_ID
#   to run multiple clients on different ports with independent identities

services:
  ghidra-bridge-client:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ${CLIENT_CONTAINER_NAME:-ghidra-mcp-bridge-client-${CLIENT_ID:-1}}
    image: ghidra-mcp-bridge
    networks:
      - ghidra-shared-network
    environment:
      # API Server configuration
      - GHIDRA_MCP_HOST=0.0.0.0
      - GHIDRA_MCP_PORT=${CLIENT_MCP_PORT:-8803}
      - GHIDRA_MCP_SSE_PORT=${CLIENT_MCP_SSE_PORT:-8804}

      # Project configuration - AUTO-SERVER MODE
      # Entrypoint generates per-client SSH key and waits for server registration
      - PROJECT_MODE=auto-server
      - PROJECT_NAME=${PROJECT_NAME:-default}

      # Ghidra Server connection (user/keystore set automatically by entrypoint)
      - GHIDRA_SERVER_HOST=${GHIDRA_SERVER_HOST:-ghidra-server}
      - GHIDRA_SERVER_PORT=${GHIDRA_SERVER_PORT:-13100}
      - AUTO_SERVER_REPO=${GHIDRA_SERVER_REPO:-/mcp-projects}

      # Program selection (open specific program from repository)
      - PROGRAM_NAME=${PROGRAM_NAME:-}

      # Auto-import: binary name to import from /import on startup
      - IMPORT_BINARY_NAME=${IMPORT_BINARY_NAME:-}

      # Client identity (determines username: bridge-1, bridge-2, ...)
      - CLIENT_ID=${CLIENT_ID:-1}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=/app/logs

      # Version info
      - GHIDRA_VERSION=${GHIDRA_VERSION}

    ports:
      - "${CLIENT_MCP_PORT:-8803}:${CLIENT_MCP_PORT:-8803}"
      - "${CLIENT_MCP_SSE_PORT:-8804}:${CLIENT_MCP_SSE_PORT:-8804}"

    volumes:
      # Per-client Ghidra configuration directory (cache, preferences, state)
      - ${GHIDRA_DATA_DIR}/${GHIDRA_VERSION}/client-config-${CLIENT_ID:-1}:/root/.ghidra:rw

      # Shared SSH directory (client writes its key, server reads it)
      - ${GHIDRA_DATA_DIR}/${GHIDRA_VERSION}/ssh:/ssh:rw

      # Binary import directory (Makefile stages BINARY_FILE here)
      - ${GHIDRA_DATA_DIR}/${GHIDRA_VERSION}/imports:/import:ro

      # Log persistence
      - ${GHIDRA_DATA_DIR}/logs/${GHIDRA_VERSION}/client-${CLIENT_ID:-1}:/app/logs:rw

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          memory: 4G

# Join external network created by server
networks:
  ghidra-shared-network:
    external: true
