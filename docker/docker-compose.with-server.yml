version: '3.8'

# Ghidra MCP Bridge with Auto-Deployed Ghidra Server
# This compose file starts both the Bridge and a Ghidra Server for shared project mode

services:
  # Ghidra Server - Auto-deployed for shared project access
  ghidra-server:
    image: blacktop/ghidra:12.0-server
    container_name: ghidra-mcp-server
    ports:
      - "${GHIDRA_SERVER_PORT:-13100}:13100"
    volumes:
      - ghidra-server-repos:/repos:rw
      - ghidra-server-config:/root/.ghidraServer:rw
    environment:
      - MAXMEM=${GHIDRA_SERVER_MAXMEM:-4G}
      - GHIDRA_USERS=${GHIDRA_SERVER_USERS:-mcp_user}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "netstat -an | grep -q 13100 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Ghidra MCP Bridge - Connects to auto-deployed server
  ghidra-bridge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ghidra-mcp-bridge
    image: ghidra-mcp-bridge
    depends_on:
      ghidra-server:
        condition: service_healthy
    environment:
      # Server configuration
      - GHIDRA_MCP_HOST=0.0.0.0
      - GHIDRA_MCP_PORT=${GHIDRA_MCP_PORT:-8803}
      - GHIDRA_MCP_SSE_PORT=${GHIDRA_MCP_SSE_PORT:-8804}

      # Project configuration - SERVER MODE
      - PROJECT_MODE=server
      - PROJECT_NAME=${PROJECT_NAME:-default}

      # Ghidra Server connection (auto-deployed server)
      - GHIDRA_SERVER_HOST=ghidra-mcp-server
      - GHIDRA_SERVER_PORT=${GHIDRA_SERVER_PORT:-13100}
      - GHIDRA_SERVER_USER=${GHIDRA_SERVER_USER:-}
      - GHIDRA_SERVER_PASSWORD=${GHIDRA_SERVER_PASSWORD:-}
      - GHIDRA_SERVER_REPO=${GHIDRA_SERVER_REPO:-/default}
      - GHIDRA_SERVER_KEYSTORE=${GHIDRA_SERVER_KEYSTORE:-}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=/app/logs

    ports:
      - "${GHIDRA_MCP_PORT:-8803}:8803"   # HTTP API
      - "${GHIDRA_MCP_SSE_PORT:-8804}:8804"   # MCP SSE

    volumes:
      # SSH keys (if using SSH authentication)
      - ${HOST_SSH_KEYSTORE:-./ssh-keys}:/root/.ghidra:ro

      # Log persistence
      - ./logs:/app/logs:rw

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          memory: 4G

# Named volumes for Ghidra Server persistence
volumes:
  ghidra-server-repos:
    name: ghidra-mcp-server-repos
  ghidra-server-config:
    name: ghidra-mcp-server-config
