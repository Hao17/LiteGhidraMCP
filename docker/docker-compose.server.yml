version: '3.8'

# Ghidra MCP Bridge - Standalone Ghidra Server
# This compose file creates an independent Ghidra Server for shared project access
# Multiple clients can connect to this server via docker-compose.client.yml
#
# Usage:
#   make server-up          # Start standalone server
#   make server-down        # Stop server
#   make server-logs        # View logs
#
# Network: Creates external network ghidra-shared-network (172.28.0.0/16)
# Server IP: 172.28.0.10 (fixed)

services:
  # Ghidra Server - Standalone deployment
  ghidra-server:
    image: blacktop/ghidra:12.0-server
    container_name: ghidra-server-standalone
    hostname: ghidra-server
    ports:
      - "${GHIDRA_SERVER_PORT:-13100}:13100"
    networks:
      ghidra-shared-network:
        ipv4_address: 172.28.0.10
    volumes:
      - ghidra-server-repos-standalone:/repos:rw
      - ghidra-server-config-standalone:/root/.ghidraServer:rw
    environment:
      - MAXMEM=${GHIDRA_SERVER_MAXMEM:-4G}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 13100 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Server initialization service (runs once on first start)
  ghidra-server-init:
    image: blacktop/ghidra:12.0-server
    container_name: ghidra-server-init-standalone
    depends_on:
      ghidra-server:
        condition: service_healthy
    networks:
      - ghidra-shared-network
    volumes:
      - ${SERVER_SSH_DIR:-./server-data/ssh}:/root/.ghidra:rw
      - ./scripts/init-ghidra-server.sh:/init.sh:ro
    environment:
      - GHIDRA_SERVER_HOST=ghidra-server
      - GHIDRA_SERVER_PORT=${GHIDRA_SERVER_PORT:-13100}
      - AUTO_SERVER_REPO=${SERVER_REPO_NAME:-/mcp-projects}
      - AUTO_SERVER_USER=${SERVER_USER_NAME:-bridge}
    command: ["/bin/bash", "/init.sh"]
    restart: "no"

# External network for server-client communication
networks:
  ghidra-shared-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

# Named volumes for server data persistence (isolated from legacy volumes)
volumes:
  ghidra-server-repos-standalone:
    name: ghidra-server-repos-standalone
  ghidra-server-config-standalone:
    name: ghidra-server-config-standalone
