version: '3.8'

services:
  ghidra-bridge:
    build:
      context: ../../..
      dockerfile: docker/Dockerfile.pyghidra
    container_name: ghidra-mcp-bridge-pyghidra-server

    env_file:
      - .env.pyghidra

    ports:
      - "${GHIDRA_MCP_PORT:-8803}:8803"
      - "${GHIDRA_MCP_SSE_PORT:-8804}:8804"

    volumes:
      # Log persistence
      - ./logs:/app/logs:rw

      # SSH private key (read-only)
      # Mount your SSH private key from host
      - ~/.ghidra/bridge_key:/root/.ghidra/ssh_key:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8803/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Extra hosts for connecting to host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"

# ========================================
# Usage Instructions
# ========================================
#
# 1. Generate SSH key pair:
#    mkdir -p ~/.ghidra
#    ssh-keygen -t rsa -b 4096 -f ~/.ghidra/bridge_key -N ""
#
# 2. Add public key to Ghidra Server:
#    - Copy ~/.ghidra/bridge_key.pub to Ghidra Server
#    - Configure server to accept this public key for user 'bridge'
#    - See docs/HEADLESS_SERVER_AUTH.md for detailed steps
#
# 3. Start container:
#    docker-compose -f docker-compose.pyghidra.yml up -d
#
# 4. Check logs:
#    docker logs -f ghidra-mcp-bridge-pyghidra-server
#
# 5. Test API:
#    curl http://localhost:8803/api/basic_info
#
