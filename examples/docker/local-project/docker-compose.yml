version: '3.8'

services:
  ghidra-bridge:
    build:
      context: ../../..
      dockerfile: docker/Dockerfile
    container_name: ghidra-mcp-bridge-local

    env_file:
      - .env

    ports:
      - "${GHIDRA_MCP_PORT:-8803}:8803"
      - "${GHIDRA_MCP_SSE_PORT:-8804}:8804"

    volumes:
      # Mount your Ghidra shared project directory here
      # Replace the left side with your actual project path
      - ${HOST_PROJECT_PATH}:/ghidra-projects:rw
      # Log persistence
      - ./logs:/app/logs:rw

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# Optional: Create a named volume for persistent logs
# volumes:
#   ghidra-logs:
